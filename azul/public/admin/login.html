<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPGRADE SYSTEMS | Acceso Máster</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css?v=5">
</head>
<body>

    <div class="login-container-split">
        <div class="login-visual-side"></div>
        <div class="login-form-side">
            <div class="login-container">
                <div class="brand-header">
                    <div class="logo-icon"><i class="fas fa-user-gear"></i></div>
                    <h1>UPGRADE SYSTEMS</h1>
                    <p>Consola Máster de Administración</p>
                </div>

                <div id="alertContainer" class="alert-box"></div>

                <form id="loginUpsForm">
                    <div class="form-group">
                        <label for="email">Correo Administrador</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="nombre@upgradesystems.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-login" id="btnSubmitUps">
                        <span>Ingresar al Panel Máster</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                    <a href="#" onclick="abrirModalRecuperar(event)" style="display:block; text-align:center; margin-top:15px; color:var(--accent-green); text-decoration:none; font-size:0.85rem; font-weight:600;">¿Olvidaste tu contraseña?</a>
                </form>
            </div>
        </div>
    </div>

    <!-- MODAL DE RECUPERACIÓN DE CONTRASEÑA -->
    <div id="modalRecuperar" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <button class="modal-close" onclick="cerrarModalRecuperar()"><i class="fas fa-times"></i></button>
            <div class="modal-header">
                <h3>Recuperar Contraseña Máster</h3>
                <p>Sigue las instrucciones para restablecer tu cuenta de administración.</p>
            </div>
            
            <div id="alertBoxRecuperar" class="alert-box" style="margin-bottom: 15px; background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5;"></div>

            <!-- PASO 1: Pedir Correo -->
            <div id="step-1" class="recuperar-step activo">
                <div class="input-group">
                    <label>Correo Electrónico Administrador</label>
                    <input type="email" id="recEmail" placeholder="nombre@upgradesystems.com" required>
                </div>
                <br>
                <button type="button" class="btn-modal" onclick="solicitarCodigoRecuperacion()">Enviar Código</button>
            </div>

            <!-- PASO 2: Pedir Código -->
            <div id="step-2" class="recuperar-step">
                <div class="input-group">
                    <label>Código de Validación (6 dígitos)</label>
                    <input type="text" id="recCodigo" maxlength="6" placeholder="123456" required style="font-family: monospace; font-size: 1.2rem; text-align: center; letter-spacing: 0.5em;">
                </div>
                <br>
                <button type="button" class="btn-modal" onclick="validarCodigoRecuperacion()">Verificar Código</button>
            </div>

            <!-- PASO 3: Definir Nueva Contraseña -->
            <div id="step-3" class="recuperar-step">
                <div class="input-group">
                    <label>Nueva Contraseña</label>
                    <input type="password" id="recNuevaPass" placeholder="Mínimo 10 caracteres con complejidad" required>
                </div>
                <div class="input-group">
                    <label>Confirmar Nueva Contraseña</label>
                    <input type="password" id="recNuevaPassConf" placeholder="Repite la nueva contraseña" required>
                </div>
                <br>
                <button type="button" class="btn-modal" onclick="guardarNuevaContrasena()">Restablecer Contraseña</button>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
